<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Furkan Ongoren">
    <title>Furkan Ongoren | Profile Card</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <img class="pattern-top bg-pattern" src="images/bg-pattern-top.svg" alt="background pattern image">
    <img class="pattern-bottom bg-pattern" src="images/bg-pattern-bottom.svg" alt="background pattern image">
    </div>
    
    <main id="main"><!-- card wrapper-->
        <article class="profile-avatar-wrap">
            <div class="profile-bg-wrap">
                <img src="images/bg-pattern-card.svg" alt="profile background image" class="profile-bg-image">
            </div>
            <!-- profile card top -->
            <header class="profile-header-wrap">
                <img src="images/image-victor.jpg" alt="profile avatar image of a man" class="profile-avatar-image">
                <h2 class="profile-avatar-name">Victor Crest <span class="profile-avatar-age">26</span></h2>
                <h3 class="profile-avatar-location">London, UK</h3>
            </header>
            <!-- profile card bottom -->
            <footer class="profile-footer">
                <hgroup class="profile-footer-stats--group g-followers">
                    <h2 class="profile-footer-stats">80K</h2>
                    <h3 class="profile-footer-stats--info">Followers</h3>
                </hgroup>
                <hgroup class="profile-footer-stats--group g-likes">
                    <h2 class="profile-footer-stats">803K</h2>
                    <h3 class="profile-footer-stats--info">Likes</h3>
                </hgroup>
                <hgroup class="profile-footer-stats--group g-photos">
                    <h2 class="profile-footer-stats">1.4K</h2>
                    <h3 class="profile-footer-stats--info">Photos</h3>
                </hgroup>
            </footer>
            <div id="author">
                <p>Created by Furkan Ongoren</p>
            </div>
        </article>
    </main>
</body>
</html>
